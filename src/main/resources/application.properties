# Server Configuration
server.port=${PORT:8080}

# Application Name
spring.application.name=leonard_portfolio-backend

# JWT Configuration
jwt.secret=${JWT_SECRET:my-default-secret-key-for-development-only-change-in-production-must-be-at-least-256-bits}

# CORS Configuration (allow React dev server and GitHub Pages)
spring.web.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,https://ffxleo.github.io,https://leonard-portfolio.onrender.com

# Logging
logging.level.com.portfolio=INFO
logging.level.org.springframework.web=INFO

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:portfoliodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
